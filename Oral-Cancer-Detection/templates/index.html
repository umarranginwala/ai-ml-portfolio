<!DOCTYPE html>
<html>
<head>
    <title>Oral Cancer Detection</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f4f4; }
        .container { padding-top: 50px; }
        .custom-file-upload { margin-bottom: 20px; }
        .footer { padding: 20px 0; text-align: center; }
        .image-preview { margin-top: 20px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="#">OralCancerDetect</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
    </nav>

    <div class="container">
        <h1 class="text-center">Upload an Image for Oral Cancer Classification</h1>
        <form method="POST" action="/" enctype="multipart/form-data" class="text-center">
            <div class="custom-file">
                <input type="file" class="custom-file-input" id="customFile" name="image" required>
                <label class="custom-file-label" for="customFile">Choose file</label>
            </div>
            <input type="submit" value="Upload and Classify" class="btn btn-primary mt-3">
        </form>

        <div class="image-preview text-center mt-3">
            <img id="preview-img" src="#" alt="your image" style="max-height: 300px; display: none;" />
        </div>

        {% if prediction %}
            <div class="alert {% if prediction == 'Cancer' %}alert-danger{% else %}alert-success{% endif %} mt-3" role="alert">
                Prediction: {{ prediction }}
            </div>
        {% endif %}
    </div>

    <div class="footer">
        <p></p>
    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <script>
        $(document).ready(function () {
            $('.custom-file-input').on('change', function() { 
               let fileName = $(this).val().split('\\').pop(); 
               $(this).next('.custom-file-label').addClass("selected").html(fileName); 

               let reader = new FileReader();
               reader.onload = function(e) {
                   $('#preview-img').attr('src', e.target.result).show();
               }
               reader.readAsDataURL(this.files[0]);
            });
        });
    </script>
</body>
</html>
