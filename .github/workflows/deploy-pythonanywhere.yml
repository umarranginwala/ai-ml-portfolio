name: Deploy to PythonAnywhere

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Prepare deployment package
      run: |
        cd demo/oral-cancer-detection-demo
        zip -r ../../deploy.zip . -x "*.pyc" -x "__pycache__/*" -x "uploads/*"
    
    - name: Upload to PythonAnywhere
      run: |
        echo "Upload deploy.zip to PythonAnywhere manually"
        echo "1. Go to https://www.pythonanywhere.com"
        echo "2. Upload deploy.zip via Files tab"
        echo "3. Extract and configure WSGI"
